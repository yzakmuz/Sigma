<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Teaching System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📐 Math Teaching System</h1>
            <div class="auth-section">
                <div id="userInfo" class="user-info hidden">
                    Logged in as: <strong id="userName"></strong>
                </div>
                <button id="logoutBtn" class="btn-secondary hidden" onclick="logout()">Logout</button>
                <button id="loginBtn" class="btn-primary" onclick="scrollToAuth()">Login</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Sidebar: Auth Form or Filters -->
            <div id="authContainer" class="auth-form">
                <div class="form-tabs">
                    <button class="form-tab active" onclick="switchTab('login')">Login</button>
                    <button class="form-tab" onclick="switchTab('register')">Register</button>
                </div>

                <div id="loginForm" class="form-content active">
                    <div id="loginMessage"></div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Password">
                    </div>
                    <button class="btn-primary" onclick="login()" style="width: 100%;">Sign In</button>
                </div>

                <div id="registerForm" class="form-content">
                    <div id="registerMessage"></div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="registerUsername" placeholder="Username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="Password">
                    </div>
                    <button class="btn-primary" onclick="register()" style="width: 100%;">Create Account</button>
                </div>
            </div>

            <!-- Right Side: Lessons or Filters -->
            <div id="lessonsContainer">
                <div id="filterContainer" class="filters">
                    <h3>🔍 Filters</h3>
                    <div class="filter-group">
                        <label>Topic</label>
                        <select id="topicFilter" onchange="filterLessons()">
                            <option value="">All Topics</option>
                            <option value="arithmetic">Arithmetic</option>
                            <option value="algebra">Algebra</option>
                            <option value="geometry">Geometry</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Difficulty Level</label>
                        <select id="levelFilter" onchange="filterLessons()">
                            <option value="">All Levels</option>
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>
                    <button class="btn-secondary" onclick="resetFilters()" style="width: 100%; margin-top: 15px;">Reset Filters</button>
                </div>

                <div id="lessonsDisplay">
                    <div class="lessons-list" id="lessonsList"></div>
                </div>
            </div>
        </div>

        <!-- Lesson Detail View -->
        <div id="lessonDetailContainer" class="hidden">
            <div class="lesson-detail">
                <button class="btn-secondary" onclick="closeLessonDetail()">← Back to Lessons</button>
                <div id="lessonDetailContent"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
